name: Validar Addon

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: 🔍 Validar configuración del addon
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ✅ Validar config.yaml
        uses: home-assistant/actions/helpers/validate-addon@master
        with:
          path: claude-terminal

      - name: 🐋 Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: claude-terminal/Dockerfile
          ignore: DL3008,DL3009,DL4006,SC2086

      - name: 📋 Verificar archivos requeridos
        run: |
          echo "Verificando estructura del addon..."
          required=(
            "claude-terminal/config.yaml"
            "claude-terminal/Dockerfile"
            "claude-terminal/run.sh"
            "claude-terminal/DOCS.md"
            "claude-terminal/CHANGELOG.md"
            "claude-terminal/icon.png"
            "claude-terminal/logo.png"
          )
          ok=true
          for f in "${required[@]}"; do
            if [ -f "$f" ]; then
              echo "  ✅ $f"
            else
              echo "  ❌ $f (FALTA)"
              ok=false
            fi
          done
          $ok || exit 1
