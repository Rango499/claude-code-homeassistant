name: Build & Publish Docker Image

on:
  push:
    branches: [main]
    paths:
      - "claude-terminal/**"
      - ".github/workflows/build.yml"
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rango499/ha-claude-code-terminal

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from_suffix: amd64
          - arch: aarch64
            platform: linux/arm64
            build_from_suffix: aarch64
          - arch: armv7
            platform: linux/arm/v7
            build_from_suffix: armv7
          # armhf (ARMv6) e i386 excluidos: Node.js 20 no soporta estas arquitecturas

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔑 Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Configurar QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🏗️ Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔍 Leer versión del addon
        id: addon_version
        run: |
          VERSION=$(grep '^version:' claude-terminal/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Versión: $VERSION"

      - name: 🐳 Build y push
        uses: docker/build-push-action@v6
        with:
          context: ./claude-terminal
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.arch }}:${{ steps.addon_version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.arch }}:latest
          build-args: |
            BUILD_FROM=ghcr.io/hassio-addons/debian-base/${{ matrix.build_from_suffix }}:7.3.2
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: 📦 Crear Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 📋 Leer versión
        id: version
        run: |
          VERSION=$(grep '^version:' claude-terminal/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 🏷️ Crear tag y release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
