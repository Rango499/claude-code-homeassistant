name: Build & Publish Docker Image

on:
  push:
    branches: [main]
    paths:
      - "claude-terminal/**"
      - ".github/workflows/build.yml"
  release:
    types: [published]
  workflow_dispatch:   # permite lanzarlo manualmente desde GitHub

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rango499/ha-claude-code-terminal

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from_suffix: amd64
          - arch: aarch64
            platform: linux/arm64
            build_from_suffix: aarch64
          - arch: armv7
            platform: linux/arm/v7
            build_from_suffix: armv7
          - arch: armhf
            platform: linux/arm/v6
            build_from_suffix: armhf
          - arch: i386
            platform: linux/386
            build_from_suffix: i386

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔑 Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Configurar QEMU (para cross-compilation)
        uses: docker/setup-qemu-action@v3

      - name: 🏗️ Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 📋 Extraer metadatos de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.arch }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🔍 Leer versión del addon
        id: addon_version
        run: |
          VERSION=$(cat claude-terminal/config.yaml | grep '^version:' | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Versión del addon: $VERSION"

      - name: 🐳 Build y push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./claude-terminal
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.arch }}:${{ steps.addon_version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.arch }}:latest
          build-args: |
            BUILD_FROM=ghcr.io/hassio-addons/debian-base/${{ matrix.build_from_suffix }}:7.3.2
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────
  # Crear un release en GitHub con las notas del CHANGELOG
  # ──────────────────────────────────────────────────────────────────────
  release:
    name: 📦 Crear Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 📋 Leer versión
        id: version
        run: |
          VERSION=$(cat claude-terminal/config.yaml | grep '^version:' | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 📝 Extraer notas del CHANGELOG
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}
          NOTES=$(awk "/## \[$VERSION\]/{flag=1; next} /## \[/{flag=0} flag" claude-terminal/CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🏷️ Crear tag y release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
