---
name: "Claude Code Terminal"
description: "Terminal integrado con Claude Code CLI para gestionar Home Assistant con IA. Acceso completo al sistema de archivos, configuraciones y automatizaciones."
version: "1.0.9"
slug: "claude_code_terminal"
init: false
arch:
  - aarch64
  - amd64
  - armv7
startup: application
boot: manual
map:
  - config:rw
  - ssl:ro
  - addons:ro
  - media:rw
  - share:rw
  - backup:ro
ports:
  8099/tcp: 8099
  7681/tcp: null
ports_description:
  8099/tcp: "Interfaz principal (editor planos + terminal)"
  7681/tcp: "Terminal ttyd (uso interno)"
options:
  auto_launch_claude: true
  dangerously_skip_permissions: false
  working_directory: "/config"
  theme: "dark"
  font_size: 14
  extra_packages: []
  extra_pip_packages: []
  custom_claude_md: ""
schema:
  auto_launch_claude: bool
  dangerously_skip_permissions: bool
  working_directory: str
  theme: list(dark|light|solarized|monokai)
  font_size: int(8,32)
  extra_packages:
    - str
  extra_pip_packages:
    - str
  custom_claude_md: str
ingress: true
ingress_port: 8099
panel_icon: "mdi:floor-plan"
panel_title: "Claude HA"
image: "ghcr.io/rango499/ha-claude-code-terminal-{arch}"
homeassistant_api: true
hassio_api: true
hassio_role: default
auth_api: true
